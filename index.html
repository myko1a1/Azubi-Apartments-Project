<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azubi Apartments | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
        <div class="background-field">
            <img src="./img/HS-BG.png" alt="Berlin">
            <div class="background-content">
                <header class="header-container">
                    <a href="#"><img class="logo" src="./img/Logo.png" alt="Azubi-Apartments"></a>
                    <a href="#"><img class="login-button" src="./img/login_36dp_FFFFFF_FILL0_wght400_GRAD0_opsz40.svg" alt="Login"></a>
                </header>
                <div class="background-text">
                    <h1>Suchst ’ne Azubi-Wohnung?</h1>
                    <h2>Mit uns wird’s einfach!</h2>
                </div>
                <div class="search-field">
                    <div class="search-box">
                        <label for="selected-city"></label>
                        <select name="selected-city" id="selected-city">
                            <option value="Berlin" selected>Berlin</option>
                            <option value="Potsdam">Potsdam</option>
                            <option value="Oranienburg">Oranienburg</option>
                            <option value="Erkner">Erkner</option>
                            <option value="Ahrensfelde">Ahrensfelde</option>
                            <option value="Falkensee">Falkensee</option>
                            <option value="Nauen">Nauen</option>
                            <option value="Wustermark">Wustermark</option>
                            <option value="Hennigsdorf">Hennigsdorf</option>
                            <option value="Neuenhagen-bei-Berlin">Neuenhagen bei Berlin</option>
                            <option value="Brandenburg">Brandenburg</option>
                            <option value="Ludwigsfelde">Ludwigsfelde</option>
                            <option value="Frankfurt-Oder">Frankfurt am Oder</option>
                            <option value="Werder-Havel">Werder am Havel</option>
                        </select>
                        <button>Suchen</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="content-borders">

        </div>
    </div>
</body>
</html>
