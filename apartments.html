<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="apartments.css">
    <title>Azubi Apartments | Apartments</title>
</head>

<body>
    <a class="home-link" href="/"><img class="arrow-icon" src="./img/arrow-left-line-svgrepo-com.svg" /></a>
    <div class="apartment-page">

        <!-- City Filter -->
        <div class="apartments-filter">
            <form class="form-filter-apartments" action="">
                <h2 class="apartments-filter-title">Apartments Filter</h2>
                <label for="citySelect" class="label-city-filter">
                    City
                    <select id="citySelect" class="city-select">
                        <option value="Deutschlandweit" selected>Deutschlandweit</option>
                        <option value="Berlin">Berlin</option>
                        <option value="Potsdam">Potsdam</option>
                        <option value="Oranienburg">Oranienburg</option>
                        <option value="Erkner">Erkner</option>
                        <option value="Stuttgart">Stuttgart</option>
                        <option value="Düsseldorf">Düsseldorf</option>
                        <option value="Brandenburg">Brandenburg</option>
                        <option value="Ludwigsfelde">Ludwigsfelde</option>
                        <option value="Leipzig">Leipzig</option>
                        <option value="Dresden">Dresden</option>
                        <option value="Frankfurt">Frankfurt</option>
                        <option value="Hannover">Hannover</option>
                    </select>
                </label>
                <!-- Price Filter -->
                <label for="priceSelect" class="label-price-filter">
                    Price
                    <select id="priceSelect" class="price-select">
                        <option value="All">All</option>
                        <option value="600">600€</option>
                        <option value="700">700€</option>
                        <option value="900">900€</option>
                        <option value="1100">1100€</option>
                        <option value="1200">1200€</option>
                        <option value="1300">1300€</option>
                        <option value="1400">1400€</option>
                    </select>
                </label>

                <!-- Search Button -->
                <button class="apartment-search-btn">Search</button>
            </form>
        </div>

        <!-- Apartments List -->
        <ul class="apartments-list" id="itemList"></ul>


        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
            import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

            const firebaseConfig = {
                databaseURL: "https://azubi-apartments-project-default-rtdb.firebaseio.com"
            };

            // Array for Apartments
            let apartmentsData = [];

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);

            const list = document.getElementById("itemList");


            // Read Data from Database
            onValue(ref(db, "apartments"), (snapshot) => {
                apartmentsData = [];

                snapshot.forEach((child) => {
                    apartmentsData.push({
                        id: child.key,
                        ...child.val()
                    });
                });

                renderApartments(apartmentsData);
            });

            function renderApartments(data) {
                list.innerHTML = "";

                // Add Apartment to List
                data.forEach((item) => {
                    const li = document.createElement("li");

                    li.innerHTML = `
            <div class="apartment-container"
                onclick="location.href='apartment-detail.html?id=${item.id}'">

                <img class="apartment-img" src="${item.images.main}" />

                <h2 class="apartment-title">${item.city}</h2>

                <div class="rating-price-container">
                    <p class="apartment-price">${item.monthly_cost_eur} €</p>
                    |
                    <p class="apartment-rating">
                        ${item.rating}
                        <img class="icon-star" src="./img/star-icon.svg" />
                    </p>
                </div>

                <p class="apartment-description">
                    ${item.description}
                </p>
            </div>
        `;

                    list.appendChild(li);
                });
            }
            // Take Items
            const citySelect = document.getElementById("citySelect");
            const priceSelect = document.getElementById("priceSelect");
            const filterForm = document.querySelector(".form-filter-apartments");

            filterForm.addEventListener("submit", (e) => {
                e.preventDefault();

                // Take Value
                const selectedCity = citySelect.value;
                const selectedPrice = priceSelect.value;

                // Filter City and Price
                const filteredApartments = apartmentsData.filter((item) => {

                    const cityMatch =
                        selectedCity === "Deutschlandweit" ||
                        item.city === selectedCity;

                    const priceMatch =
                        selectedPrice === "All" ||
                        item.monthly_cost_eur <= Number(selectedPrice);

                    return cityMatch && priceMatch;
                });

                renderApartments(filteredApartments);
            });
        </script>
    </div>
</body>

</html>
